name: Upstream Sync

# Runs bin/check-upstream.sh on a weekly cron and on demand. Surfaces
# brndle's drift from roots/sage by opening or updating a tracking issue.
# Reads only repo files plus the public roots/sage GitHub API — no
# untrusted user payload is consumed, so command-injection guidance at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# does not apply.

on:
  schedule:
    # Mondays 09:00 UTC — fresh report at the start of each week.
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Check upstream drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run upstream check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          chmod +x bin/check-upstream.sh
          REPORT=$(bash bin/check-upstream.sh)
          {
            echo "report<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "$REPORT"

      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT: ${{ steps.check.outputs.report }}
        run: |
          set -e
          TITLE="Upstream sync — drift report"
          BODY=$(printf '%s\n\n%s\n\n```\n%s\n```\n' \
            "Auto-generated by .github/workflows/upstream-check.yml (Mondays 09:00 UTC)." \
            "See plans/2026-05-02-long-term-roadmap.md → Upstream tracking for context." \
            "$REPORT")

          NUM=$(gh issue list --label upstream-sync --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "$BODY"
            echo "Commented on existing issue #$NUM"
          else
            gh label create upstream-sync --color FBCA04 --description "Upstream drift tracking" 2>/dev/null || true
            gh issue create --title "$TITLE" --label upstream-sync --body "$BODY"
          fi
