name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Pint (code style)
        run: vendor/bin/pint --test

  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Syntax check (php -l)
        run: find app resources -name "*.php" -not -path "*/vendor/*" -exec php -l {} + 2>&1 | grep -v "No syntax errors" || true

      - name: Check for deprecated features
        run: |
          echo "Checking for PHP deprecations..."
          # Detect dynamic properties (deprecated 8.2+)
          grep -rn '#\[AllowDynamicProperties\]' app/ || echo "No AllowDynamicProperties found (good)"
          # Detect ${var} in strings (deprecated 8.2+)
          grep -rPn '\$\{[a-zA-Z_]' app/ resources/ --include="*.php" || echo "No deprecated string interpolation found (good)"

  blade:
    name: Blade Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken @php syntax
        run: |
          echo "Checking for single-line @php...@endphp (breaks Blade)..."
          if grep -rn '@php .*@endphp' resources/views/; then
            echo "::error::Found single-line @php...@endphp patterns that break Blade compilation. Use @php(\$expr) instead."
            exit 1
          fi
          echo "All clear."

      - name: Check for hardcoded colors
        run: |
          echo "Checking for hardcoded colors that bypass theme system..."
          ISSUES=0
          # Check for hardcoded indigo/emerald (should use accent)
          if grep -rn 'text-emerald-\|text-indigo-\|from-indigo-\|via-purple-\|to-cyan-' resources/views/ --include="*.blade.php"; then
            echo "::warning::Found hardcoded Tailwind colors that should use theme CSS variables"
            ISSUES=$((ISSUES+1))
          fi
          # Check for hardcoded hex bg colors (except in comments)
          if grep -rn 'bg-\[#' resources/views/ --include="*.blade.php" | grep -v '{{--'; then
            echo "::warning::Found hardcoded hex background colors"
            ISSUES=$((ISSUES+1))
          fi
          if [ $ISSUES -eq 0 ]; then echo "All clear."; fi

  settings:
    # Reads only repo files (Defaults.php, admin/src/tabs/*.jsx, app/**, resources/**).
    # No untrusted GitHub event payload is consumed, so command-injection guidance
    # in https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
    # does not apply here.
    name: Settings Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run settings consistency check
        run: node bin/check-settings-consistency.mjs

  build:
    name: Build Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite + Tailwind)
        run: npm run build

      - name: Build admin panel
        run: npm run admin:build

      - name: Build block editor
        run: npm run blocks:build

      - name: Verify build output
        run: |
          echo "Checking build artifacts..."
          test -f public/build/manifest.json || (echo "::error::Missing manifest.json" && exit 1)
          test -d public/build/assets || (echo "::error::Missing build assets" && exit 1)
          test -f admin/build/index.js || (echo "::error::Missing admin build" && exit 1)
          test -f blocks/build/index.js || (echo "::error::Missing blocks build" && exit 1)
          echo "All build artifacts present."
          ls -lh public/build/assets/app-*.css public/build/assets/app-*.js
